  /* ─── VIDEOS ────────────────────────────────────────────── */

  function VideoCard({v, T, i}) {
    var [hov,setHov] = React.useState(false);
    var videoRef = React.useRef(null);
    React.useEffect(function() {
      var el = videoRef.current;
      if (!el) return;
      var isMobile = window.innerWidth <= 768;
      var rootMargin = isMobile ? "0px 0px 1200px 0px" : "0px 0px 800px 0px";
      var loadDelay = isMobile ? 0 : ([0, 0, 800, 1600, 0, 0][i] || 0);
      var timer;
      function startVideo() {
        if (el.src) return;
        el.src = v.videoSrc;
        el.play().catch(function() {
          el.addEventListener('canplay', function() { el.play().catch(function(){}); }, { once: true });
        });
      }
      var obs = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && !el.src) {
          obs.disconnect();
          if (loadDelay) { timer = setTimeout(startVideo, loadDelay); } else { startVideo(); }
        }
      }, { rootMargin: rootMargin });
      obs.observe(el);
      return function() { obs.disconnect(); clearTimeout(timer); };
    }, [v.videoSrc, i]);
    return (
      <div className="vcard" onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{transform:hov?"translateY(-2px)":"none",transition:"transform 0.18s",animation:"fadeUp 0.5s "+(0.04*i)+"s ease both",cursor:"default"}}>
        <a href={v.linkedInUrl} target="_blank" style={{display:"block",borderRadius:8,overflow:"hidden",cursor:"pointer"}}>

          <div style={{fontSize:10,color:"var(--dim)",fontWeight:700,letterSpacing:"0.04em",marginBottom:3}}>{v.series}</div>

        </div>
      </div>
    );
  }

  /* ─── TWEAKS ────────────────────────────────────────────── */

  function TweaksPanel({T, setT, show}) {
    if (!show) return null;
    function set(k,v) {
      var next = Object.assign({},T,[k]=v,T); next[k]=v;
      setT(next);
      if(k==="dotColor") document.documentElement.style.setProperty("--dot",v);      if(k==="darkMode") {
        document.documentElement.classList[v?"add":"remove"]("dark");
      }
      window.parent.postMessage({type:"__edit_mode_set_keys",edits:next},"*");
    }
    var DOTS = ["#2563EB","#7C3AED","#059669","#DC2626","#EA580C"];
    return (
      <div className="tweaks-panel">
        <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",opacity:0.4,marginBottom:14}}>Tweaks</div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,opacity:0.5,marginBottom:9}}>element icon</div>
          <div style={{display:"flex",gap:8}}>
            {["fire","water","air","earth"].map(e=>(
              <div key={e} onClick={()=>set("elementIcon",e)}
                style={{cursor:"pointer",opacity:T.elementIcon===e?1:0.35,transition:"opacity 0.15s",fontSize:9,textAlign:"center"}}>
                <ElementIcon name={e} color={T.dotColor} size={22}/>
                <div style={{marginTop:3,letterSpacing:"0.05em"}}>{e}</div>
              </div>
            ))}

        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,opacity:0.5,marginBottom:9}}>dot color</div>
          <div style={{display:"flex",gap:8}}>
            {DOTS.map(c=>(
              <div key={c} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",outline:T.dotColor===c?"2px solid #fff":"none",outlineOffset:2}} onClick={()=>set("dotColor",c)}/>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,opacity:0.5,marginBottom:9}}>dark mode</div>
          <div style={{width:40,height:22,borderRadius:11,background:T.darkMode?T.dotColor:"#444",cursor:"pointer",position:"relative",transition:"background 0.2s"}} onClick={()=>set("darkMode",!T.darkMode)}>
            <div style={{position:"absolute",top:3,left:T.darkMode?21:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
          </div>
        </div>
      </div>
    );
  }

  /* ─── APP ───────────────────────────────────────────────── */

  function App() {
    var [page,   setPage]      = useState("home");
    var [T,      setT]         = useState(TWEAK_DEFAULTS);
    var [showTw, setShowTw]    = useState(false);

    useEffect(()=>{ document.documentElement.style.setProperty("--dot", T.dotColor); }, [T.dotColor]);
    useEffect(()=>{
      document.documentElement.classList[T.darkMode?"add":"remove"]("dark");
    }, [T.darkMode]);
    useEffect(()=>{
      var titles = {home:"lauren nowak",experience:"about—lauren nowak",caseStudy:"multi-agent orchestrator—lauren nowak",opsAudit:"marketing ops audit—lauren nowak",brandCheck:"brand check—lauren nowak",videos:"videos—lauren nowak",resume:"resume—lauren nowak",writing:"writing—lauren nowak"};
      document.title = titles[page] || (page.startsWith("article_") ? "writing—lauren nowak" : "lauren nowak");
    }, [page]);

    useEffect(()=>{
      function onMsg(e) {
        if(e.data&&e.data.type==="__activate_edit_mode")   setShowTw(true);
        if(e.data&&e.data.type==="__deactivate_edit_mode") setShowTw(false);
      }
      window.addEventListener("message",onMsg);
      window.parent.postMessage({type:"__edit_mode_available"},"*");
      return ()=>window.removeEventListener("message",onMsg);
    },[]);

    useEffect(()=>{
      page==="home" ? document.body.classList.remove("scrollable") : document.body.classList.add("scrollable");
    },[page]);

    return (
      <div style={{background:"var(--bg)",color:"var(--fg)",minHeight:"100vh"}}>
        <Nav page={page} setPage={setPage} dotColor={T.dotColor} elementIcon={T.elementIcon}/>
        {page==="home"       && <Home T={T} setPage={setPage}/>}
        {page==="experience" && <ExperiencePage T={T}/>}
        {page==="videos"     && <VideosPage T={T} setPage={setPage}/>}
        {page==="resume"     && <ResumePage T={T}/>}
        {page==="writing"    && <WritingPage T={T} setPage={setPage}/>}
        {page==="caseStudy"  && <CaseStudyPage T={T} setPage={setPage}/>}
        {page==="opsAudit"   && <OpsAuditPage T={T} setPage={setPage}/>}
        {page==="brandCheck" && <BrandCheckPage T={T} setPage={setPage}/>}
        {page==="article_1"  && <ArticlePage T={T} setPage={setPage} articleId={1}/>}
        {page==="article_2"  && <ArticlePage T={T} setPage={setPage} articleId={2}/>}
        {page==="article_3"  && <ArticlePage T={T} setPage={setPage} articleId={3}/>}
        <TweaksPanel T={T} setT={setT} show={showTw}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
